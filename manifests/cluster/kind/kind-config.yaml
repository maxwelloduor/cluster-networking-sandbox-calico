# manifests/cluster/kind/kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: calico-sandbox
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080   # maps host:8080 → ingress controller
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "role=control-plane"
    extraMounts:
      - hostPath: /tmp
        containerPath: /tmp
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "role=worker,node=node1"
    extraMounts:
      - hostPath: /tmp
        containerPath: /tmp
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "role=worker,node=node2"
    extraMounts:
      - hostPath: /tmp
        containerPath: /tmp

networking:
  disableDefaultCNI: true   # Calico will manage networking
  podSubnet: "192.168.0.0/16"
  serviceSubnet: "10.96.0.0/12"

kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    networking:
      dnsDomain: cluster.local